name: Sync portolan-cli SKILL.md

on:
  schedule:
    - cron: '23 8 * * 1'  # Weekly on Monday
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream SKILL.md
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/portolan-sdi/portolan-cli/main/SKILL.md \
            -o upstream-skill.md

      - name: Check for changes
        id: diff
        run: |
          if ! diff -q upstream-skill.md skills/portolan-cli/SKILL.md > /dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build updated skill file
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Prepend the skill frontmatter, then the upstream content
          cat > skills/portolan-cli/SKILL.md << 'FRONTMATTER'
          ---
          name: portolan-cli
          description: Use when publishing, managing, or converting cloud-native geospatial data catalogs with the Portolan CLI. Covers init, add, check, push, pull, sync, partitioning, and format conversion workflows.
          ---

          FRONTMATTER
          cat upstream-skill.md >> skills/portolan-cli/SKILL.md
          rm upstream-skill.md

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update portolan-cli skill from upstream SKILL.md"
          title: "Sync portolan-cli skill with upstream"
          body: |
            Automated sync from [portolan-cli SKILL.md](https://github.com/portolan-sdi/portolan-cli/blob/main/SKILL.md).

            Please review the diff to ensure the frontmatter and any skill-specific additions are preserved.
          branch: sync/portolan-cli-skill
          delete-branch: true
